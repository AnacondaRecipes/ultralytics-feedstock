{% set name = "ultralytics" %}
{% set version = "8.4.19" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: e4bb5abf58e54fcb2c36fe37a6b12ab96b73de766692f24e53b69f1fa8987eb3

build:
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  skip: true  # [py<38]
  entry_points:
    - yolo = ultralytics.cfg:entrypoint
    - ultralytics = ultralytics.cfg:entrypoint

requirements:
  host:
    - python
    - pip
    - setuptools >=70.0.0,<=81.0.0
    - wheel
  run:
    - python
    - numpy >=1.23
    - matplotlib-base >=3.3.0
    - opencv >=4.6.0
    - pillow >=7.1.2
    - pyyaml >=5.3.1
    - requests >=2.23.0
    - scipy >=1.4.1
    - pytorch >=1.8.0  # [unix]
    - pytorch >=1.8.0,!=2.4.0  # [win]
    - torchvision >=0.9.0 
    - psutil
    - polars
    - ultralytics-thop >=2.0.18
  run_constrained:
    # export
    # No numpy <2.0.0 for Python 3.13
    - numpy <2.0.0  # [py<313]
    - onnx >=1.12.0  # [not osx]
    - onnx >=1.12.0,<1.18.0  # [osx]
    - onnxslim >=0.1.82
    - coremltools >=9.0  # [not win and py<=313]
    - scikit-learn >=1.3.2  # [not win and py<=313]
    - openvino >=2024.0.0
    # Remove tensorflow upper bound to avoid solver failures between tensorflow/pytorch/torchvision versions.
    - tensorflow >=2.0.0
    - tensorflowjs >=2.0.0
    - tensorstore >=0.1.63  # [aarch64 and py>=39]
    - h5py !=3.11.0  # [aarch64]
    # solutions
    - shapely >=2.0.0
    - streamlit >=1.51.0  # [py>=310]
    - streamlit >=1.29.0,<1.51.0  # [py<310 and (not linux)]
    - flask >=3.0.1
    # extra
    - albumentations>=1.4.6
    - faster-coco-eval >=1.6.7

{% set deselect_tests = "" %}
# Failing only on CI, requires GUI handling.
{% set deselect_tests = deselect_tests + " --deselect=tests/test_python.py::test_utils_checks" %}  # [osx]
{% set deselect_tests = deselect_tests + " --deselect=tests/test_solutions.py" %}  # [osx]
# openvivo is not available on main channel
# Upstream test env tries to install it during test execution but it is failing to install on Linux CI.
# WARNING requirements: Command 'pip install --no-cache-dir "openvino>=2024.0.0" ' returned non-zero exit status 1.
# ERROR 0m export failure 2.8s: No module named 'openvino'
{% set deselect_tests = deselect_tests + " --deselect=tests/test_exports.py::test_export_openvino" %}  # [linux]

test:
  source_files:
    - tests
  imports:
    - ultralytics
    - ultralytics.cfg
    - ultralytics.data
    - ultralytics.data.annotator
    - ultralytics.data.augment
    - ultralytics.data.build
    - ultralytics.data.converter
    - ultralytics.data.dataset
    - ultralytics.data.loaders
    - ultralytics.data.split
    - ultralytics.data.utils
    - ultralytics.engine.exporter
    - ultralytics.engine.model
    - ultralytics.engine.predictor
    - ultralytics.engine.results
    - ultralytics.engine.trainer
    - ultralytics.engine.validator
    - ultralytics.hub
    - ultralytics.hub.auth
    - ultralytics.hub.session
    - ultralytics.hub.utils
    - ultralytics.models
    - ultralytics.models.sam.modules.blocks
    - ultralytics.models.sam.modules.utils
    - ultralytics.models.yolo
    - ultralytics.models.yolo.classify.predict
    - ultralytics.models.yolo.classify.train
    - ultralytics.models.yolo.classify.val
    - ultralytics.models.yolo.detect
    - ultralytics.models.yolo.detect.predict
    - ultralytics.models.yolo.segment
    - ultralytics.models.yolo.world
    - ultralytics.models.yolo.world.train_world
    - ultralytics.nn.autobackend
    - ultralytics.nn.modules
    - ultralytics.nn.modules.head
    - ultralytics.nn.modules.transformer
    - ultralytics.nn.modules.utils
    - ultralytics.nn.tasks
    - ultralytics.optim
    - ultralytics.solutions.config
    - ultralytics.solutions.object_counter
    - ultralytics.solutions.solutions
    - ultralytics.utils
    - ultralytics.utils.autobatch
    - ultralytics.utils.autodevice
    - ultralytics.utils.checks
    - ultralytics.utils.cpu
    - ultralytics.utils.dist
    - ultralytics.utils.downloads
    - ultralytics.utils.errors
    - ultralytics.utils.events
    - ultralytics.utils.export
    - ultralytics.utils.files
    - ultralytics.utils.git
    - ultralytics.utils.instance
    - ultralytics.utils.loss
    - ultralytics.utils.metrics
    - ultralytics.utils.nms
    - ultralytics.utils.ops
    - ultralytics.utils.patches
    - ultralytics.utils.plotting
    - ultralytics.utils.tal
    - ultralytics.utils.torch_utils
    - ultralytics.utils.tqdm
  requires:
    - pip
    - pytest
    - git
    - tensorflow
    - tf-keras
    # Specific version to fix: RuntimeError: Couldn't load custom C++ ops. This can happen if your PyTorch and torchvision versions are incompatible.
    # https://github.com/AnacondaRecipes/torchvision-feedstock/blob/master/recipe/meta.yaml#L8C8-L8C26
    - pytorch 2.7.0

  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v tests {{ deselect_tests }}
    - yolo checks
    - ultralytics version

about:
  home: https://ultralytics.com
  summary: Ultralytics YOLO for SOTA object detection, multi-object tracking, instance segmentation, pose estimation and image classification.
  license: AGPL-3.0-only
  license_family: GPL
  license_file: LICENSE
  description: |
    Ultralytics creates cutting-edge, state-of-the-art (SOTA) YOLO models built on years of
    foundational research in computer vision and AI. Constantly updated for performance and
    flexibility, our models are fast, accurate, and easy to use. They excel at object detection, tracking,
    instance segmentation, image classification, and pose estimation tasks.
  doc_url: https://docs.ultralytics.com
  dev_url: https://github.com/ultralytics/ultralytics

extra:
  recipe-maintainers:
    - onuralpszr
    - UltralyticsAssistant
    - glenn-jocher
    - Laughing-q
    - pderrenger